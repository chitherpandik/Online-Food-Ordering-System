<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Main Page</title>
    <style>
        body {
            font-family: Arial;
            background: url("bg.jpg") no-repeat center center fixed;
            background-size: cover;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 60px auto;
            background: rgba(255,255,255,0.95);
            padding: 24px;
            border-radius: 8px;
            text-align: center;
        }

        .menu-container {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            gap: 20px;
        }

        .menu-card {
            width: 280px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
            padding: 15px;
        }

        .menu-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
        }

        .menu-card h3 {
            margin: 10px 0;
            color: #ff5722;
        }

        button {
            padding: 10px 16px;
            background: #ff5722;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
        }

        #logoutBtn {
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="welcome">Welcome</h1>
    <p>Select your menu</p>

    <div class="menu-container">

        <!-- Morning Menu -->
        <div class="menu-card">
            <img src="https://via.placeholder.com/300x200?text=Morning+Food" alt="Morning Menu">
            <h3>🌅 Morning Menu</h3>
            <p>Idli, Dosa, Pongal, Tea</p>
            <button>View Menu</button>
        </div>

        <!-- Evening Menu -->
        <div class="menu-card">
            <img src="https://via.placeholder.com/300x200?text=Evening+Snacks" alt="Evening Menu">
            <h3>🌇 Evening Menu</h3>
            <p>Samosa, Bajji, Coffee</p>
            <button>View Menu</button>
        </div>

        <!-- Night Menu -->
        <div class="menu-card">
            <img src="https://via.placeholder.com/300x200?text=Night+Dinner" alt="Night Menu">
            <h3>🌙 Night Menu</h3>
            <p>Biryani, Fried Rice, Parotta</p>
            <button>View Menu</button>
        </div>

    </div>

    <button id="logoutBtn">Logout</button>
</div>

<script>
    // Protect page (use sessionStorage so closing tab logs out)
    if (sessionStorage.getItem('loggedIn') !== 'true') {
        window.location.href = 'login.html';
    }

    const name =
        sessionStorage.getItem('userFullName') ||
        sessionStorage.getItem('userEmail') ||
        'User';

    document.getElementById('welcome').textContent = 'Welcome, ' + name + '!';

    document.getElementById('logoutBtn').addEventListener('click', function () {
        sessionStorage.setItem('loggedIn', 'false');
        sessionStorage.removeItem('userFullName');
        window.location.href = 'login.html';
    });
</script>

</body>
</html>
