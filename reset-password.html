e <!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reset Password</title>
  <style>
    body{font-family:Arial;background:url('bg.jpg') no-repeat center center fixed;background-size:cover}
    .box{width:360px;margin:80px auto;padding:20px;background:rgba(255,255,255,0.95);border-radius:8px}
    h2{text-align:center;color:#ff5722}
    input{width:100%;padding:8px;margin:8px 0}
    button{width:100%;padding:8px;background:#ff5722;color:#fff;border:none;cursor:pointer}
    a{color:#ff5722}
  </style>
</head>
<body>
  <div class="box">
    <h2>Reset Password</h2>
    <form id="resetForm">
      <input id="tokenInput" name="token" type="hidden">
      <input id="newPassword" name="password" type="password" placeholder="New password" required minlength="6">
      <input id="confirmPassword" type="password" placeholder="Confirm password" required minlength="6">
      <button type="submit">Set new password</button>
    </form>
    <p style="text-align:center;margin-top:10px"><a href="login.html">Back to login</a></p>
  </div>
<script>
(function(){
  function qs(name){
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }
  const token = qs('token') || '';
  document.getElementById('tokenInput').value = token;
  const form = document.getElementById('resetForm');
  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const password = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    if(password !== confirm){ alert('Passwords do not match'); return; }
    if(!token){ alert('Missing token'); return; }
    try{
      const resp = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, password: password })
      });
      const data = await resp.json();
      if(resp.ok){
        alert(data.message || 'Password reset successful');
        window.location.href = 'login.html';
      } else {
        alert(data.error || 'Reset failed');
      }
    } catch(err){ console.error(err); alert('Network or server error'); }
  });
})();
</script>
</body>
</html>
