<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Afternoon Menu</title>
    <style>
        body { font-family: Arial; background: url("bg.jpg") no-repeat center center fixed; background-size: cover; }
        .wrap { max-width: 900px; margin: 60px auto; background: rgba(255,255,255,0.96); padding: 20px; border-radius: 8px; }
        h1 { color: #ff5722; text-align: center; }
        .choices { display:flex; gap:20px; justify-content:center; margin-top:24px; flex-wrap:wrap }
        .choice { flex:0 1 320px; background:#fff; padding:18px; border-radius:8px; box-shadow:0 0 10px #ccc; text-align:center }
        .choice img { width:100%; height:180px; object-fit:cover; border-radius:6px }
        .choice h3 { margin:12px 0 6px; color:#333 }
        .choice p { margin:0 0 12px; color:#666 }
        .open-btn { display:inline-block; padding:10px 14px; background:#ff5722; color:#fff; border-radius:6px; text-decoration:none }
        .back { display:block; width:160px; margin:26px auto 0; padding:10px; text-align:center; background:#ff5722; color:#fff; border-radius:6px; text-decoration:none }
    </style>
</head>
<body>
<div class="wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
        <h1>Afternoon Menu</h1>
    </div>
    <p style="text-align:center;color:#555">Choose a menu type for the afternoon — Veg or Non-Veg.</p>

    <div class="choices">
        <div class="choice">
            <img src="afternoon veg/bg.jpg" alt="Veg Menu">
            <h3>VEG Menu</h3>
            <p>Fresh vegetarian lunch options — rice, sambar, and seasonal sides.</p>
            <a class="open-btn" href="afternoon-veg.html">Open Veg Menu</a>
        </div>

        <div class="choice">
            <img src="afternoon non/bg.jpg" alt="Non-Veg Menu">
            <h3>Non-VEG Menu</h3>
            <p>Hearty non-vegetarian dishes with local spices and grilled options.</p>
            <a class="open-btn" href="afternoon-nonveg.html">Open Non-VEG Menu</a>
        </div>
    </div>

    <a class="back" href="main.html">← Back to menus</a>
</div>

<script>
    // no cart shown on this page
</script>
</body>
</html>
