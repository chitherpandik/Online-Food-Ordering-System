<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Landing</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html,body{height:100%;margin:0}
    .hero{
      background: url('bg.jpg') center/cover no-repeat fixed;
      height:100%;display:flex;align-items:center;justify-content:center;position:relative;color:#fff
    }
    .overlay{background:rgba(0,0,0,0.45);padding:30px;border-radius:8px;text-align:center}
    .overlay h1{font-size:36px;margin:0 0 12px}
    .enter{display:inline-block;padding:12px 20px;background:#ff5722;color:#fff;border-radius:6px;text-decoration:none;font-weight:700}
    @media(max-width:600px){.overlay h1{font-size:22px}}
  </style>
</head>
<body>
  <div class="hero">
    <div class="overlay">
      <h1 id="heroTitle">ONLINE FOOD ORDERING SYSTEM</h1>
      <p id="heroDesc" style="max-width:560px;margin:8px auto 16px;color:#ffe;display:none">Order fresh, local meals with ease.</p>
      <a id="enterBtn" class="enter" href="#">Enter Site</a>
    </div>
  </div>
  <script>
    // Show landing for ~5.5 seconds, then navigate to home.html

    // Background images to cycle: start with main hero then rotate morning/afternoon/night
    const previews = [
      { bg: 'bg.jpg' },
      { bg: 'morning.jpg' },
      { bg: 'Afternoon.jpg' },
      { bg: 'night1.jpg' }
    ];

    let idx = 0;
    const titleEl = document.getElementById('heroTitle');
    const descEl = document.getElementById('heroDesc');
    const enterBtn = document.getElementById('enterBtn');

    function updatePreview(i){
      const p = previews[i];
      // keep the main title fixed; only change background image
      try{ document.querySelector('.hero').style.backgroundImage = `url('${p.bg || 'bg.jpg'}')`; }catch(e){}
      enterBtn.href = 'home.html';
    }

    // initial
    updatePreview(idx);


    // cycle previews every 10 seconds
    const iv = setInterval(()=>{
      idx = (idx + 1) % previews.length;
      updatePreview(idx);
    }, 10000);

    // Do not auto-redirect to menu from the landing page; users should first land on home.html
  </script>
</body>
</html>
